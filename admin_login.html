<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TXYSONA Admin Login</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  height: 100vh; display: flex; align-items: center; justify-content: center;
}
.card {
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 24px; padding: 44px 36px; width: 360px; text-align: center;
  backdrop-filter: blur(20px); box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}
.icon { font-size: 52px; margin-bottom: 16px; }
h1 { font-size: 24px; color: #fff; font-weight: 800; margin-bottom: 6px; }
p  { font-size: 13px; color: #666; margin-bottom: 30px; }
input {
  width: 100%; padding: 13px 16px; border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.07); color: #fff; font-size: 14px;
  outline: none; margin-bottom: 12px; transition: border-color 0.2s;
  font-family: inherit;
}
input:focus { border-color: #667eea; }
input::placeholder { color: #555; }
.err { color: #ff6b6b; font-size: 13px; margin-bottom: 12px; min-height: 20px; }
button {
  width: 100%; padding: 14px; border-radius: 12px; border: none; cursor: pointer;
  background: linear-gradient(135deg, #667eea, #764ba2); color: #fff;
  font-size: 15px; font-weight: 700; font-family: inherit;
  transition: opacity 0.2s, transform 0.15s; margin-top: 4px;
}
button:hover { opacity: 0.9; transform: translateY(-1px); }
.note { margin-top: 20px; font-size: 11px; color: #444; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🛡️</div>
  <h1>TXYSONA Admin</h1>
  <p>Sirf admin ke liye access</p>
  <form method="POST">
    <input type="text"     name="username" placeholder="Admin Username" required autofocus>
    <input type="password" name="password" placeholder="Admin Password" required>
    <div class="err">{{ error }}</div>
    <button type="submit">🔓 Login</button>
  </form>
  <div class="note">🔒 Yeh page server par protected hai</div>
</div>
</body>
</html>
